<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep2Wake · 멋쟁이사자처럼</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/login.css">
  <style>
    .course-saved-box {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: rgba(255,123,0,0.08);
      border: 1px solid rgba(255,123,0,0.3);
      border-radius: 10px;
    }
    .course-saved-name {
      font-size: 14px; font-weight: 600;
      color: #FF7B00; flex: 1;
    }
    .course-saved-check {
      font-size: 14px; color: #22c55e; font-weight: 700;
    }
    .course-change-btn {
      padding: 4px 12px;
      background: transparent;
      border: 1px solid rgba(255,123,0,0.4);
      border-radius: 6px;
      color: #FF7B00; font-size: 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .course-change-btn:hover { background: rgba(255,123,0,0.12); }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div id="alert-toast" class="alert-toast"></div>

  <div class="login-wrapper">

    <!-- 왼쪽 브랜드 -->
    <div class="brand-side">
      <div class="brand-logo">
        <img class="brand-logo-img-wide" src="assets/images/한글_logo.webp" alt="멋쟁이사자처럼">
      </div>
      <p class="brand-tagline"><span class="highlight">졸음</span>을 감지하고, <span class="highlight">깨움</span>으로 바꾸다</p>
      <h1 class="brand-headline">Sleep<span class="highlight">2</span>Wake</h1>

      <p class="brand-desc">
        수강생의 집중도를 실시간으로 감지하고, 강사와 매니저가 
        <br> 한눈에 파악할 수 있는 AI 학습 참여도 관리 플랫폼
      </p>

      <div class="brand-features">
        <div class="feat-item">
          <div class="feat-dot"></div>
          <span>웹캠 기반 실시간 졸음·이탈 자동 감지</span>
        </div>
        <div class="feat-item">
          <div class="feat-dot"></div>
          <span>브라우저 단독 처리 — 서버 영상 전송 없음</span>
        </div>
        <div class="feat-item">
          <div class="feat-dot"></div>
          <span>강사·매니저 실시간 대시보드 & 리포트 제공</span>
        </div>
      </div>
    </div>

    <!-- 오른쪽 로그인 카드 -->
    <div class="login-card">

      <div class="card-header">
        <div class="card-title">수업 입장하기</div>
        <div class="card-sub">이름을 입력하고 역할을 선택해주세요</div>
      </div>

      <!-- 역할 탭 -->
      <div class="tab-group">
        <button class="tab-btn active" onclick="selectTab('student')">👨‍💻 수강생</button>
        <button class="tab-btn"        onclick="selectTab('instructor')">🎓 강사</button>
        <button class="tab-btn"        onclick="selectTab('admin')">🛡️ 매니저</button>
      </div>

      <!-- 이름 입력 -->
      <div class="form-group">
        <label class="form-label">이름</label>
        <input class="form-input" type="text" id="input-name"
               placeholder="본인 이름을 입력하세요" maxlength="10"
               oninput="onNameInput()">
      </div>

      <!-- 수강생: 방 코드 입력 -->
      <div class="form-group" id="room-code-group">
        <label class="form-label">
          방 코드
          <span class="form-label-hint">강사에게 공유받은 코드를 입력하세요</span>
        </label>
        <div class="room-input-wrap">
          <input class="form-input room-input" type="text" id="input-room"
                 placeholder="예: lion-xxxx"
                 maxlength="30"
                 oninput="this.value = this.value.toUpperCase()">
          <button class="room-paste-btn" onclick="pasteRoomCode()" title="붙여넣기">
            📋
          </button>
        </div>
      </div>

      <!-- 매니저: 방 코드 불필요 -->
      <div class="form-group" id="admin-notice" style="display:none;">
        <div class="admin-notice-box">
          🛡️ 매니저는 방 코드 없이 전체 수업을 모니터링합니다
        </div>
      </div>

      <!-- 강사: 과정명 입력 -->
      <div class="form-group" id="instructor-course-group" style="display:none;">
        <label class="form-label">
          과정명
          <span class="form-label-hint">이 과정의 모든 수업에 사용됩니다</span>
        </label>

        <!-- 첫 입장: 직접 입력 -->
        <div id="course-input-wrap">
          <input class="form-input" type="text" id="input-course"
                 placeholder="예: AI 엔지니어링 과정" maxlength="30">
        </div>

        <!-- 두 번째부터: 저장된 과정명 표시 -->
        <div id="course-saved-wrap" style="display:none;">
          <div class="course-saved-box">
            <span class="course-saved-name" id="course-saved-text"></span>
            <span class="course-saved-check">✓</span>
            <button class="course-change-btn" onclick="resetCourseName()">변경</button>
          </div>
        </div>
      </div>

      <button class="login-btn" onclick="doLogin()">
        <span id="login-btn-text">입장하기</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8H13M9 4L13 8L9 12" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="login-footer">
        <span>멋쟁이사자처럼</span> 전용 플랫폼 · 무단 접근 금지
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
